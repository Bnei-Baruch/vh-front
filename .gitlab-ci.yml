stages:
  - pre
  - build
  - deploy

variables:
  BASE_IMAGE: $CI_REGISTRY_IMAGE/base:$CI_COMMIT_SHORT_SHA
  BASE_LATEST_IMAGE: $CI_REGISTRY_IMAGE/base:latest
  STAGING_IMAGE: $CI_REGISTRY_IMAGE/staging:$CI_COMMIT_SHORT_SHA
  STAGING_LATEST_IMAGE: $CI_REGISTRY_IMAGE/staging:latest
  PROD_IMAGE: $CI_REGISTRY_IMAGE/prod:$CI_COMMIT_TAG
  PROD_LATEST_IMAGE: $CI_REGISTRY_IMAGE/prod:latest
  STAGING_URL: "http://$STAGING_DOMAIN/" # because in production we dont serve root domain using https
  PRODUCTION_URL: "https://$PRODUCTION_DOMAIN/"

build_base:
  image: docker:latest
  stage: pre
  tags:
    - dockerbuild
  services:
    - docker:19.03.12-dind
  before_script:
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
  script:
    - date
    - docker pull $BASE_LATEST_IMAGE || true
    - docker build -t $BASE_IMAGE --cache-from $BASE_LATEST_IMAGE -f Dockerfile-base .
    - docker tag $BASE_IMAGE $BASE_LATEST_IMAGE
    - docker push $BASE_IMAGE
    - docker push $BASE_LATEST_IMAGE
    - date
  rules:
    - changes:
        - package.json
        - Dockerfile-base
        - .gitlab-ci.yml
      allow_failure: true
build_staging:
  image: docker:latest
  stage: build
  tags:
    - dockerbuild
  services:
    - docker:19.03.12-dind
  before_script:
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
  script:
    - date
    - docker pull $BASE_LATEST_IMAGE || true
    - docker build --build-arg BASE_IMAGE=$BASE_LATEST_IMAGE  -t $STAGING_IMAGE .
    - docker tag $STAGING_IMAGE $STAGING_LATEST_IMAGE
    - docker push $STAGING_IMAGE
    - docker push $STAGING_LATEST_IMAGE
    - date
  only:
    - master

deploy_staging:
  #image: tmaier/docker-compose:latest
  image: gitlab.bbdev.team:5050/vh/buildutils/buildutil:0.2.0
  stage: deploy
  tags:
    - staging
  script:
    - mkdir -p /opt/$CI_PROJECT_PATH || true
    - env
    - for variable in "${!DYN_STAGING@}"; do echo "${variable#DYN_STAGING_}"="${!variable}"; export "${variable#DYN_STAGING_}"="${!variable}"; done;
    - gomplate --input-dir=config-templates --output-map="/opt/$CI_PROJECT_PATH/public/config/{{ .in | strings.ReplaceAll \".js\" \"-${CI_COMMIT_SHORT_SHA}.js\" }}"
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
    - IMAGE_NAME=$STAGING_IMAGE docker-compose up -d
  only:
    - master


build_production:
  image: docker:latest
  stage: build
  tags:
    - dockerbuild
  services:
    - docker:19.03.12-dind
  before_script:
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
  script:
    - docker build --build-arg BASE_IMAGE=$BASE_LATEST_IMAGE --build-arg IS_STAGING_BUILD=false --build-arg PUBLIC_URL=$PRODUCTION_URL -t $PROD_IMAGE .
    - docker push $PROD_IMAGE
  only:
    - tags

deploy_production:
  #image: tmaier/docker-compose:latest
  image: gitlab.bbdev.team:5050/vh/buildutils/buildutil:0.2.0
  stage: deploy
  tags:
    - production
  script:
    - mkdir -p /opt/$CI_PROJECT_PATH || true
    - env
    - for variable in "${!DYN_PROD@}"; do echo "${variable#DYN_PROD_}"="${!variable}"; export "${variable#DYN_PROD_}"="${!variable}"; done;
    - gomplate --input-dir=config-templates --output-map="/opt/$CI_PROJECT_PATH/public/config/{{ .in | strings.ReplaceAll \".js\" \"-${CI_COMMIT_SHORT_SHA}.js\" }}"
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
    - IMAGE_NAME=$PROD_IMAGE docker-compose up -d
  only:
    - tags
  when: manual
