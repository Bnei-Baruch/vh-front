stages:
  - publish
  - deploy

variables:
  IMAGE: $CI_REGISTRY/vh/vh-front:$CI_COMMIT_SHORT_SHA

publish:
  image: docker:latest
  stage: publish
  tags:
    - dockerbuild
  services:
    - docker:19.03.12-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY/vh/vh-front:$CI_COMMIT_SHORT_SHA .
    - docker push $IMAGE

deploy:
  image: docker:latest
  stage: deploy
  tags:
    - dockerbuild
  script:
    #- docker -H tcp://51.15.238.1:2375 login  -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    # - docker -H tcp://51.15.238.1:2375 pull $IMAGE
    # - docker -H tcp://51.15.238.1:2375 rm -f vh-front
    # - docker -H tcp://51.15.238.1:2375 run -d --net=vh --name vh-bbpayment --restart always -p 80:80 $IMAGE
    - chmod og=$ID_RSA
    - apk update && apk add openssh-client
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP "docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY"
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP "docker pull $TAG_COMMIT"
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP "docker container rm -f my-app || true"
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP "docker run -d -p 80:80 --name my-app $TAG_COMMIT"
  environment:
    name: development
    url: http://51.15.238.1
  only:
    - development
